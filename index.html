<script type="text/javascript">
    // Создаём заглушку, чтобы вызовы ym() из приложения не падали до загрузки скрипта
    window.ym = window.ym || function () { (window.ym.a = window.ym.a || []).push(arguments) };
    window.ym.l = 1 * new Date();

    function loadYandexMetrika() {
        if (window.__ymLoaded) return;
        window.__ymLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://mc.yandex.ru/metrika/tag.js';
        s.onload = function () {
            ym(106235112, 'init', {
                clickmap: true,
                trackLinks: true,
                accurateTrackBounce: true,
                webvisor: true,
                trackHash: true,
                ecommerce: 'dataLayer'
            });
        };
        document.head.appendChild(s);
    }

    // Загружаем метрику после первого пользовательского взаимодействия
    // или через 4 секунды простоя — что наступит раньше.
    // Это разгружает основной поток на этапе LCP/TBT.
    var events = ['scroll', 'mousemove', 'touchstart', 'keydown', 'click'];
    var fired = false;
    function fire() {
        if (fired) return;
        fired = true;
        events.forEach(function (e) { window.removeEventListener(e, fire); });
        loadYandexMetrika();
    }
    events.forEach(function (e) { window.addEventListener(e, fire, { once: true, passive: true }); });
    if ('requestIdleCallback' in window) {
        requestIdleCallback(fire, { timeout: 4000 });
    } else {
        setTimeout(fire, 4000);
    }
</script>
